<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Gym Workout Tracker</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="container login-wrapper d-flex justify-content-center align-items-center">

        <div class="login-card shadow-lg">

            <h2 class="text-center title mb-2">🏋️ Gym Tracker</h2>
            <p class="text-center subtitle mb-4">Login to your account</p>

            {% if messages %}
            {% for message in messages %}
            <div class="alert alert-danger">{{ message }}</div>
            {% endfor %}
            {% endif %}

            <form method="POST">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label text-light">Username</label>
                    <input type="text" name="username" class="form-control" placeholder="Enter username" required>
                </div>

                <div class="mb-4">
                    <label class="form-label text-light">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Enter password" required>
                </div>

                <button type="submit" class="btn btn-primary btn-login w-100">
                    Login
                </button>

            </form>

            <p class="text-center text-light mt-4">
                Don't have an account?
                <a href="{% url 'register' %}">Register</a>
            </p>

        </div>

    </div>

</body>

</html>
