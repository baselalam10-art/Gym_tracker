<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Gym Workout Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
   
</head>
<style>
    body {
        background: linear-gradient(135deg, #12121b, #16213e);
        min-height: 100vh;
    }
    .card {
        border: none;
        border-radius: 20px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        padding: 40px !important;
    }
    .form-control {
        border-radius: 25px;
        padding: 13px 16px;
        border: 1.5px solid #ddd;
        font-size: 14px;
        background: #f8f9fa;
    }
    .form-control:focus {
        border-color: #4361ee;
        box-shadow: none;
        background: white;
    }
    .btn-primary {
        background: #4361ee;
        border: none;
        border-radius: 25px;
        padding: 13px;
        font-weight: 600;
        font-size: 15px;
    }
    .btn-primary:hover { background: #3451d1; }
</style>

<body class="d-flex align-items-center justify-content-center min-vh-100">
    <div class="card p-4" style="width: 100%; max-width: 400px;">
        <div class="text-center mb-4">
            <div style="font-size: 44px;">🏋️</div>
            <h4 class="fw-bold mt-2 mb-0">Gym Workout Tracker</h4>
            <p class="text-muted small">Login to continue your journey</p>
        </div>

        {% if messages %}
        {% for message in messages %}
        <div class="alert alert-danger py-2">{{ message }}</div>
        {% endfor %}
        {% endif %}

        <form method="POST" action="">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label fw-semibold">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter username" required>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Login</button>
        </form>

        <p class="text-center text-muted small mt-3 mb-0">
            Don't have an account? <a href="{% url 'register' %}" class="text-decoration-none fw-semibold">Register</a>
        </p>

        <p class="text-center text-muted small mt-2">
            Are you a Coach? <a href="/admin" class="text-decoration-none fw-semibold ">Login as a Coach</a>
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
