<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Gym Workout Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
 <style>
        body {
            background: linear-gradient(135deg, #12121b, #16213e);
            min-height: 100vh;
        }

        .card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            padding: 40px !important;
        }

        .form-control {
            border-radius: 25px;
            padding: 13px 16px;
            border: 1.5px solid #ddd;
            font-size: 14px;
            background: #f8f9fa;
        }

        .form-control:focus {
            border-color: #4361ee;
            box-shadow: none;
            background: white;
        }

        .btn-primary {
            background: #1cd82f;
            border: none;
            border-radius: 25px;
            padding: 13px;
            font-weight: 600;
            font-size: 15px;
        }

        .btn-primary:hover {
            background: #3451d1;
        }
    </style>

<body class="bg-light">
    <div class="container d-flex justify-content-center align-items-center min-vh-100">
        <div class="card shadow p-4" style="width: 100%; max-width: 420px;">
            <h2 class="text-center mb-4 fw-bold">🏋️ Gym Tracker</h2>
            <h5 class="text-center text-muted mb-4">Create a new account</h5>

            {% if messages %}
            {% for message in messages %}
            <div class="alert alert-danger">{{ message }}</div>
            {% endfor %}
            {% endif %}

            <form method="POST" action="">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control" placeholder="Enter username" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control" placeholder="Enter email" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Enter password" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Confirm Password</label>
                    <input type="password" name="confirm_password" class="form-control" placeholder="Confirm password"
                        required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Register</button>
            </form>

            <p class="text-center mt-3">Already have an account? <a href="{% url 'login' %}">Login</a></p>
        </div>
    </div>
</body>

</html>
